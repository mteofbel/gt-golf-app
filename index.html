    html += `<tr${sep}><td class="hole-num">${h+1}</td>
      <td><input type="number" class="score-input" id="par-${h}" min="3" max="6"
        value="${es.pars[h]||''}" placeholder="—"
        oninput="onParInput(${h},this.value)"></td>
      ${PLAYERS.map((_,pi)=>`<td><input type="number" class="score-input" id="sc-${h}-${pi}"
        min="1" max="15" value="${es.scores[h][pi]||''}" placeholder="—"
        oninput="onScoreInput(${h},${pi},this.value)"></td>`).join('')}
    </tr>`;
  }

  html += `<tr class="total-row"><td>Total</td><td id="par-total">—</td>
    ${PLAYERS.map((_,pi)=>`<td id="total-${pi}">—</td>`).join('')}
  </tr></tbody></table></div></div>`;

  // Overrides
  html += buildOverridesSection();
  return html;
}

function buildTotalsEntrySection() {
  const es = enterState;
  return `<div class="card"><div class="card-head">
    <div class="card-title">📊 Round Totals</div>
    <span class="card-tag tag-round">${gtNum(es.year)} · R${es.round}</span>
  </div>
  <div class="totals-grid">
    ${PLAYERS.map(p=>`<div class="total-input-box">
      <div class="total-input-name">${p}</div>
      <input type="number" class="total-input-field" id="tot-${p}"
        min="50" max="150" placeholder="—" value="${es.totals[p]||''}"
        oninput="enterState.totals['${p}']=+this.value||null">
    </div>`).join('')}
  </div></div>
  ${buildOverridesSection()}`;
}

function buildAwardsEntrySection(year) {
  const es = enterState;
  const aw = es.awards;
  const playerOpts = (val) => `<option value="">—</option>${PLAYERS.map(p=>`<option value="${p}" ${p===val?'selected':''}>${p}</option>`).join('')}`;

  let html = `<div class="card"><div class="card-head">
    <div class="card-title">🏅 Awards — ${year}</div></div>
  <div class="awards-grid">`;

  if (showAward('jacket', year)) {
    const label = jacketIsStroke(year) ? `${jacketImg("1rem")} Purple Jacket (Stroker)` : `${jacketImg("1rem")} Purple Jacket (Match Play)`;
    html += `<div class="award-box"><div class="award-label">${label}</div>
      <select class="award-select" id="aw-jacket" onchange="enterState.awards.jacket=this.value">${playerOpts(aw.jacket)}</select>
    </div>`;
  }

  if (showAward('stroker', year) && !jacketIsStroke(year)) {
    html += `<div class="award-box"><div class="award-label">🏆 Stroker (Low Score)</div>
      <select class="award-select" id="aw-stroker" onchange="enterState.awards.stroker=this.value">${playerOpts(aw.stroker)}</select>
    </div>`;
  } else if (year === 2011) {
    html += `<div class="award-box"><div class="award-label">🏆 Low Score (pre-Stroker)</div>
      <select class="award-select" id="aw-stroker" onchange="enterState.awards.stroker=this.value">${playerOpts(aw.stroker)}</select>
    </div>`;
  }

  if (showAward('buddy', year)) {
    html += `<div class="award-box"><div class="award-label">🪆 Buddy (High Score)</div>
      <select class="award-select" id="aw-buddy" onchange="enterState.awards.buddy=this.value">${playerOpts(aw.buddy)}</select>
    </div>`;
  }

  html += `</div>
  <div style="padding:0 16px 16px;">
    <div class="setup-label" style="margin-bottom:6px;">Notes (optional)</div>
    <textarea class="notes-input" rows="2" placeholder="e.g. First tournament, hosted at..."
      oninput="enterState.awards.notes=this.value">${aw.notes||''}</textarea>
  </div></div>`;

  return html;
}

function buildOverridesSection() {
  const es = enterState;
  const r1 = computeMatchResult(es.scores, es.m1[0], es.m1[1]);
  const r2 = computeMatchResult(es.scores, es.m2[0], es.m2[1]);
  const p1=PLAYERS[es.m1[0]],p2=PLAYERS[es.m1[1]];
  const p3=PLAYERS[es.m2[0]],p4=PLAYERS[es.m2[1]];
  const isR4 = es.round === 4;

  return `<div class="override-block">
    <div class="override-title">Match Results · Auto-calculated · Override if needed</div>
    <div class="override-row">
      <span class="override-label">${isR4?jacketImg('0.9rem')+' ':''}${p1} vs ${p2}</span>
      <span class="override-calc" id="calc-m1">${r1.text}</span>
      <input type="text" class="override-input" placeholder="e.g. 3&2"
        value="${es.ovr_m1}" oninput="enterState.ovr_m1=this.value" id="ovr-m1">
    </div>
    <div class="override-row">
      <span class="override-label">${p3} vs ${p4}</span>
      <span class="override-calc" id="calc-m2">${r2.text}</span>
      <input type="text" class="override-input" placeholder="e.g. 1 Up"
        value="${es.ovr_m2}" oninput="enterState.ovr_m2=this.value" id="ovr-m2">
    </div>
    ${es.round < 4 ? `<div class="override-row">
      <span class="override-label">Team: ${es.team}</span>
      <span class="override-calc" id="calc-team">—</span>
      <input type="text" class="override-input" placeholder="e.g. 2&1"
        value="${es.ovr_team}" oninput="enterState.ovr_team=this.value" id="ovr-team">
    </div>` : ''}
    <div class="override-note">Leave override blank to use the auto-calculated result.</div>
  </div>`;
}

function getSavedTime(year, round, mode) {
  // We don't store a timestamp in sheets, so just return empty
  return '';
}

// ════════════════════════════════════════════════
//  ENTER EVENT HANDLERS
// ════════════════════════════════════════════════
function onCourseChange(course) {
  enterState.course = course;
  // Auto-fill pars if known and pars haven't been manually entered yet
  const knownPars = COURSE_PARS[course];
  if (knownPars) {
    const anyManualPar = enterState.pars.some(p => p !== null);
    if (!anyManualPar) {
      enterState.pars = [...knownPars];
    } else {
      // Ask via confirm if pars already entered
      if (confirm('Pre-fill pars for ' + course + '? This will replace any pars you have already entered.')) {
        enterState.pars = [...knownPars];
      }
    }
    // Re-render only if in hole-by-hole mode
    if (enterState.mode === 'hole') {
      // Update par inputs directly without full re-render
      for (let h = 0; h < 18; h++) {
        const el = document.getElementById('par-' + h);
        if (el) el.value = enterState.pars[h] || '';
      }
      updateTotals();
      updateMatchStatus();
    }
  }
}

function onYearChange(year) {
  enterState.year = year;
  resetEnterScores();
  renderEnter();
}

function onRoundChange(round) {
  enterState.round = round;
  if (round === 4) {
    // Auto-set matchups from seedings
    const standings = computeJacketStandings(enterState.year);
    if (standings.length === 4) {
      enterState.m1 = [PLAYERS.indexOf(standings[0].name), PLAYERS.indexOf(standings[1].name)];
      enterState.m2 = [PLAYERS.indexOf(standings[2].name), PLAYERS.indexOf(standings[3].name)];
    }
    enterState.team = null;
  }
  resetEnterScores();
  renderEnter();
}

function setMode(mode) {
  enterState.mode = mode;
  renderEnter();
}

function onM1Change(idx) {
  const opts = getMatchOptions();
  const chosen = opts[idx];
  enterState.m1 = chosen.m1;
  const used = new Set(chosen.m1);
  enterState.m2 = [0,1,2,3].filter(i=>!used.has(i));
  enterState.team = getTeamOptions()[0];
  renderEnter();
}

function getMatchOptions() {
  return [
    {m1:[0,1],m2:[2,3]},
    {m1:[0,2],m2:[1,3]},
    {m1:[0,3],m2:[1,2]},
  ];
}

function getTeamOptions() {
  const [p1,p2] = enterState.m1;
  const [p3,p4] = enterState.m2;
  return [
    `${PLAYERS[p1]}+${PLAYERS[p3]} vs ${PLAYERS[p2]}+${PLAYERS[p4]}`,
    `${PLAYERS[p1]}+${PLAYERS[p4]} vs ${PLAYERS[p2]}+${PLAYERS[p3]}`,
  ];
}

function resetEnterScores() {
  enterState.pars = Array(18).fill(null);
  enterState.scores = Array.from({length:18}, () => [null,null,null,null]);
  enterState.totals = {MTE:null,CJL:null,JDW:null,MJP:null};
  enterState.ovr_m1 = ''; enterState.ovr_m2 = ''; enterState.ovr_team = '';

  // Pre-fill from existing data if available
  const year = enterState.year, round = enterState.round;
  const holeRows = DB.scores.filter(r => +r.Year===year && +r.Round===round).sort((a,b)=>+a.Hole-+b.Hole);
  if (holeRows.length) {
    holeRows.forEach((row,h) => {
      enterState.pars[h] = +row.Par || null;
      PLAYERS.forEach((p,pi) => { enterState.scores[h][pi] = +row[p] || null; });
    });
    const course = holeRows[0].Course || '';
    enterState.course = course;
  }
  const rndRow = DB.rounds.find(r => +r.Year===year && +r.Round===round);
  if (rndRow) {
    if (!enterState.course && rndRow.Course) enterState.course = rndRow.Course;
    PLAYERS.forEach(p => { if (rndRow[p]) enterState.totals[p] = +rndRow[p]; });
    if (rndRow.M1) {
      const parts = rndRow.M1.split(' vs ');
      if (parts.length===2) {
        enterState.m1 = [PLAYERS.indexOf(parts[0].trim()), PLAYERS.indexOf(parts[1].trim())];
      }
    }
    if (rndRow.M2) {
      const parts = rndRow.M2.split(' vs ');
      if (parts.length===2) {
        enterState.m2 = [PLAYERS.indexOf(parts[0].trim()), PLAYERS.indexOf(parts[1].trim())];
      }
    }
    enterState.team = rndRow.Team || getTeamOptions()[0];
    enterState.ovr_m1 = rndRow.M1_Result || '';
    enterState.ovr_m2 = rndRow.M2_Result || '';
    enterState.ovr_team = rndRow.Team_Result || '';
  }

  // Pre-fill awards
  const aw = DB.awards.find(r => +r.Year===year);
  if (aw) {
    enterState.awards = { jacket: aw.Jacket||'', stroker: aw.Stroker||'', buddy: aw.Buddy||'', notes: aw.Notes||'' };
  } else {
    enterState.awards = { jacket:'', stroker:'', buddy:'', notes:'' };
  }
}

function onParInput(hole, val) {
  enterState.pars[hole] = +val || null;
  updateTotals();
  updateMatchStatus();
}

function onScoreInput(hole, pi, val) {
  enterState.scores[hole][pi] = +val || null;
  const input = document.getElementById(`sc-${hole}-${pi}`);
  if (input) colorInput(input, hole, pi);
  updateTotals();
  updateMatchStatus();
}

function colorInput(input, hole, pi) {
  const s = enterState.scores[hole][pi];
  const p = enterState.pars[hole];
  input.className = 'score-input';
  if (s && p) {
    const d = s-p;
    if (d<=-2) input.classList.add('eagle');
    else if (d===-1) input.classList.add('birdie');
    else if (d===1) input.classList.add('bogey');
    else if (d>=2) input.classList.add('double');
  }
}

function recolorAllCells() {
  for (let h=0; h<18; h++) {
    for (let pi=0; pi<4; pi++) {
      const input = document.getElementById(`sc-${h}-${pi}`);
      if (input) colorInput(input, h, pi);
    }
  }
  updateTotals();
  updateMatchStatus();
}

function updateTotals() {
  const parSum = enterState.pars.reduce((s,p)=>s+(p||0),0);
  const ptEl = document.getElementById('par-total');
  if (ptEl) ptEl.textContent = parSum || '—';
  PLAYERS.forEach((_,pi) => {
    const sum = enterState.scores.reduce((s,row)=>s+(row[pi]||0),0);
    const el = document.getElementById(`total-${pi}`);
    if (el) el.textContent = sum || '—';
  });
}

function updateMatchStatus() {
  const r1 = computeMatchResult(enterState.scores, enterState.m1[0], enterState.m1[1]);
  const r2 = computeMatchResult(enterState.scores, enterState.m2[0], enterState.m2[1]);
  const el1 = document.getElementById('status-m1');
  const el2 = document.getElementById('status-m2');
  const c1 = document.getElementById('calc-m1');
  const c2 = document.getElementById('calc-m2');
  if (el1) { el1.textContent = r1.text; el1.className = 'msp-status '+(r1.winner?'up':'even'); }
  if (el2) { el2.textContent = r2.text; el2.className = 'msp-status '+(r2.winner?'up':'even'); }
  if (c1) c1.textContent = r1.text;
  if (c2) c2.textContent = r2.text;
}

// ════════════════════════════════════════════════
//  SAVE
// ════════════════════════════════════════════════
let pendingSave = false;

function saveEntry() {
  const es = enterState;
  const year = es.year, round = es.round, mode = es.mode;

  const hasExisting =
    (mode==='hole' && DB.scores.some(r=>+r.Year===year&&+r.Round===round)) ||
    (mode==='totals' && DB.rounds.some(r=>+r.Year===year&&+r.Round===round)) ||
    (mode==='awards' && DB.awards.some(r=>+r.Year===year));

  if (hasExisting) {
    pendingSave = true;
    document.getElementById('modal-title').textContent = `Overwrite ${gtNum(year)}${mode==='awards'?'':' Round '+round}?`;
    document.getElementById('modal-body').textContent = `This already has saved data. Saving will replace it.`;
    document.getElementById('confirm-modal').classList.remove('hidden');
  } else {
    doSave();
  }
}

function closeModal() {
  pendingSave = false;
  document.getElementById('confirm-modal').classList.add('hidden');
}

function confirmSave() {
  closeModal();
  doSave();
}

async function doSave() {
  const es = enterState;
  const btn = document.querySelector('.submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  let payload;
  if (es.mode === 'hole') {
    payload = {
      action: 'saveHoleByHole',
      year: es.year, round: es.round,
      course: document.getElementById('sel-course')?.value || es.course || '',
      pars: es.pars,
      scores: es.scores,
      matches: {
        m1: es.m1, m2: es.m2,
        team: es.round < 4 ? (document.getElementById('sel-team')?.value || es.team) : null
      },
      overrides: { m1: es.ovr_m1, m2: es.ovr_m2, team: es.ovr_team }
    };
  } else if (es.mode === 'totals') {
    const course = document.getElementById('sel-course')?.value || es.course || '';
    payload = {
      action: 'saveRoundTotals',
      year: es.year, round: es.round, course,
      MTE: es.totals.MTE, CJL: es.totals.CJL, JDW: es.totals.JDW, MJP: es.totals.MJP,
      m1: es.m1, m1Result: es.ovr_m1,
      m2: es.m2, m2Result: es.ovr_m2,
      team: document.getElementById('sel-team')?.value || es.team || '',
      teamResult: es.ovr_team
    };
  } else {
    payload = {
      action: 'saveAwards',
      year: es.year,
      jacket: es.awards.jacket,
      stroker: es.awards.stroker,
      buddy: es.awards.buddy,
      notes: es.awards.notes
    };
  }

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });

    // Reload data from sheet
    await fetchData();
    updateHeader();
    showToast(`✓ Saved!`, 'success');
    renderEnter();
  } catch(e) {
    showToast('Error saving — check connection', 'error');
    if (btn) { btn.disabled = false; btn.textContent = '✓ Save'; }
  }
}

// ════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
async function init() {
  // Show loading state on scores page
  document.getElementById('page-scores').innerHTML = loading('Loading tournament data…');

  const ok = await fetchData();
  if (!ok) {
    document.getElementById('page-scores').innerHTML = `<div class="empty-state">
      <div class="es-icon">⚠️</div>
      <div class="es-title">Could not load data</div>
      <div class="es-sub">Check your internet connection and try refreshing.</div>
    </div>`;
    document.getElementById('header-badge').textContent = 'Offline';
    return;
  }

  updateHeader();
  renderScores();
}

window.addEventListener('DOMContentLoaded', init);
</script>
